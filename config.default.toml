[giva]
data_dir = "~/.local/share/giva"
log_level = "INFO"

[mail]
# Mailboxes to sync (Apple Mail mailbox names)
mailboxes = ["INBOX", "Sent", "Drafts", "Archive"]
# Max messages to fetch per periodic sync via AppleScript
batch_size = 50
# Sync interval in minutes (for background scheduler)
sync_interval_minutes = 15
# Months of email history for initial bootstrap sync
initial_sync_months = 4
# Max months to backfill during incremental deepening (post-bootstrap)
deep_sync_max_months = 24
# Number of sent email bodies to sample for writing style analysis
writing_style_sample_size = 20

[calendar]
# Sync window
sync_window_past_days = 7
sync_window_future_days = 30
sync_interval_minutes = 15

[llm]
# Assistant model (large) — used for answering user queries
model = "mlx-community/Qwen3-30B-A3B-4bit"
# Filter model (small, fast) — used during sync to classify emails as keep/skip
filter_model = "mlx-community/Qwen3-8B-4bit"
max_tokens = 2048
temperature = 0.7
top_p = 0.9
context_budget_tokens = 8000

[goals]
# Background strategy generation interval (hours)
strategy_interval_hours = 6
# Hour of day (0-23) to trigger daily review prompt
daily_review_hour = 18
# Max strategies to generate per background run
max_strategies_per_run = 1
# Tactical plan horizon in days
plan_horizon_days = 7
# Weekly reflection: day of week (0=Monday, 6=Sunday) and hour
weekly_reflection_day = 6
weekly_reflection_hour = 18

[agents]
# Pluggable agent system
enabled = true
# LLM-based routing: automatically match queries to specialized agents
routing_enabled = true
# Max seconds an agent can run before timeout
max_execution_seconds = 60
# Orchestrator: max wall-clock seconds for full plan+execute+synthesize cycle
# orchestrator_timeout_seconds = 180
# Orchestrator: max subtasks the planner is allowed to create
# orchestrator_max_subtasks = 6
# Scheduler: enable periodic agent tasks (opt-in, runs automated agent work)
# scheduler_agent_enabled = false
# Scheduler: how often to check for automated agent work (minutes)
# scheduler_agent_interval_minutes = 60

# --- MCP Servers (optional, requires `pip install giva[mcp]` + Node.js for npx) ---
# Uncomment and adjust paths/tokens. Servers auto-register as agents at startup.
#
# [mcp_servers.filesystem]
# transport = "stdio"
# command = "npx"
# args = ["-y", "@modelcontextprotocol/server-filesystem", "~/Documents", "~/Desktop"]
# timeout_seconds = 30
# description = "Read, write, and search files on disk"
#
# [mcp_servers.fetch]
# transport = "stdio"
# command = "python3"
# args = ["-m", "mcp_server_fetch"]
# timeout_seconds = 30
# description = "Fetch web pages and convert to markdown"
#
# [mcp_servers.messages]
# transport = "stdio"
# command = "npx"
# args = ["-y", "@foxychat-mcp/apple-imessages"]
# timeout_seconds = 30
# description = "Send and read iMessages, search contacts"
#
# [mcp_servers.notes]
# transport = "stdio"
# command = "npx"
# args = ["apple-notes-mcp"]
# timeout_seconds = 30
# description = "Create, read, update, and search Apple Notes"
#
# [mcp_servers.discord]
# transport = "stdio"
# command = "npx"
# args = ["-y", "discord-mcp"]
# env = { DISCORD_BOT_TOKEN = "Bot your_token_here" }  # prefix with "Bot " for bot tokens
# timeout_seconds = 30
# description = "Send and receive Discord messages"

[voice]
# Voice mode: TTS (text-to-speech) and STT (speech-to-text)
enabled = false
# Qwen3-TTS model via mlx-audio (runs locally on Apple Silicon)
tts_model = "mlx-community/Qwen3-TTS-12Hz-0.6B-Base-4bit"
tts_voice = "af_heart"
# Lightning Whisper MLX model for speech-to-text
stt_model = "distil-medium.en"
# Audio sample rate for TTS output
sample_rate = 24000
