# Giva Secrets — copy to ~/.config/giva/secrets.toml and fill in your values.
#
# This file holds API tokens and credentials that should NEVER be committed.
# The app loads secrets from ~/.config/giva/secrets.toml at startup and injects
# them into MCP server environment variables automatically.
#
# Usage in config.toml:
#   [mcp_servers.discord]
#   env = { DISCORD_BOT_TOKEN = "$DISCORD_BOT_TOKEN" }
#
# Any env value starting with "$" is resolved against [secrets] below.

[secrets]
# DISCORD_BOT_TOKEN = "Bot YOUR_TOKEN_HERE"
